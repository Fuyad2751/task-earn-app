<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>প্যাকেজ সমূহ - টাস্ক কিং</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen pb-24">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2"><i class="fas fa-box text-2xl"></i><span class="text-xl font-bold">আপগ্রেড প্যাকেজ</span></div>
            <div class="flex items-center gap-3">
                <span class="text-sm bg-white/20 px-3 py-1 rounded-full"><i class="fas fa-chart-simple mr-1"></i> লেভেল <span id="userLevel">১</span></span>
                <span class="text-sm bg-yellow-500/30 px-3 py-1 rounded-full"><i class="fas fa-coins mr-1"></i> <span id="userBalance">০</span> টাকা</span>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-2">আমাদের প্যাকেজসমূহ</h1>
            <p class="text-white/70">ব্যালেন্স থাকলে সরাসরি আপগ্রেড, কম থাকলে পেমেন্ট অপশন</p>
        </div>

        <div id="packagesList" class="space-y-4"></div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="fixed inset-0 bg-black/70 backdrop-blur z-50 hidden items-center justify-center p-4">
        <div class="bg-gray-800 rounded-2xl p-6 max-w-md w-full border border-gray-700 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-white">প্যাকেজ পেমেন্ট</h3>
                <button onclick="closePaymentModal()" class="text-gray-400 hover:text-white">&times;</button>
            </div>
            
            <div class="space-y-3">
                <div class="bg-white/10 rounded-xl p-3">
                    <p class="text-gray-300 text-sm">প্যাকেজ লেভেল</p>
                    <p class="text-white font-bold text-xl" id="modalPackageLevel">-</p>
                </div>
                <div class="bg-white/10 rounded-xl p-3">
                    <p class="text-gray-300 text-sm">প্যাকেজ মূল্য</p>
                    <p class="text-white font-bold text-xl" id="modalPackagePrice">-</p>
                </div>
                <div class="bg-white/10 rounded-xl p-3">
                    <p class="text-gray-300 text-sm">আপনার ব্যালেন্স</p>
                    <p class="text-white font-bold text-xl" id="modalUserBalance">-</p>
                </div>
                <div class="bg-yellow-500/20 rounded-xl p-3">
                    <p class="text-gray-300 text-sm">প্রয়োজনীয় টাকা</p>
                    <p class="text-yellow-400 font-bold text-xl" id="modalNeedAmount">-</p>
                </div>
                
                <!-- পেমেন্ট মেথড সিলেক্ট -->
                <div>
                    <label class="block text-white mb-2">পেমেন্ট মেথড সিলেক্ট করুন</label>
                    <select id="paymentMethod" onchange="updatePaymentInstructions()" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
                        <option value="">-- সিলেক্ট করুন --</option>
                        <option value="bkash">বিকাশ (bKash)</option>
                        <option value="nagad">নগদ (Nagad)</option>
                        <option value="rocket">রকেট (Rocket)</option>
                    </select>
                </div>
                
                <!-- পেমেন্ট নির্দেশনা -->
                <div id="paymentInstructions" class="hidden bg-blue-500/20 rounded-xl p-4 border border-blue-500/30">
                    <p class="text-blue-400 font-bold mb-2"><i class="fas fa-info-circle mr-2"></i> টাকা পাঠানোর নির্দেশনা:</p>
                    <div id="instructionContent" class="text-white text-sm space-y-2">
                        <!-- Dynamic content will appear here -->
                    </div>
                </div>
                
                <div>
                    <label class="block text-white mb-2">ট্রানজাকশন আইডি (TxID)</label>
                    <input type="text" id="transactionId" placeholder="যেমন: 8N7k2L9P" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>
                
                <div class="flex gap-3 mt-4">
                    <button onclick="submitPaymentRequest()" class="flex-1 bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition">পেমেন্ট রিকোয়েস্ট করুন</button>
                    <button onclick="closePaymentModal()" class="flex-1 bg-gray-600 text-white font-bold py-3 rounded-xl hover:bg-gray-700 transition">বাতিল</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 bg-black/70 backdrop-blur z-50 hidden items-center justify-center p-4">
        <div class="bg-gray-800 rounded-2xl p-6 max-w-md w-full text-center border border-gray-700">
            <div class="bg-green-500 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check-circle text-3xl text-white"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2" id="successMessage">সফল!</h3>
            <button onclick="closeSuccessModal()" class="mt-4 bg-yellow-500 text-white px-6 py-2 rounded-lg hover:bg-yellow-600 transition">ঠিক আছে</button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 w-full bg-gray-900/90 backdrop-blur border-t border-gray-800 flex justify-around py-2">
        <a href="dashboard-home.html" class="flex flex-col items-center text-gray-400 hover:text-yellow-400"><i class="fas fa-home text-xl"></i><span class="text-xs">হোম</span></a>
        <a href="task-video.html" class="flex flex-col items-center text-gray-400 hover:text-yellow-400"><i class="fas fa-play-circle text-xl"></i><span class="text-xs">টাস্ক</span></a>
        <a href="packages.html" class="flex flex-col items-center text-yellow-400"><i class="fas fa-box text-xl"></i><span class="text-xs">প্যাকেজ</span></a>
        <a href="withdraw.html" class="flex flex-col items-center text-gray-400 hover:text-yellow-400"><i class="fas fa-wallet text-xl"></i><span class="text-xs">উত্তোলন</span></a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400 hover:text-yellow-400"><i class="fas fa-user text-xl"></i><span class="text-xs">প্রোফাইল</span></a>
    </nav>

    <script>
        const token = localStorage.getItem('authToken');
        if (!token) window.location.href = 'login.html';

        let packages = [];
        let userBalance = 0;
        let currentPackage = null;

        // পেমেন্ট নির্দেশনা আপডেট (আপনার নাম্বার 01701143360 বসানো হয়েছে)
        function updatePaymentInstructions() {
            const method = document.getElementById('paymentMethod').value;
            const instructionsDiv = document.getElementById('paymentInstructions');
            const contentDiv = document.getElementById('instructionContent');
            
            if (!method) {
                instructionsDiv.classList.add('hidden');
                return;
            }
            
            instructionsDiv.classList.remove('hidden');
            
            if (method === 'bkash') {
                contentDiv.innerHTML = `
                    <p><i class="fab fa-bkash text-pink-400 mr-2"></i> <strong>বিকাশ (bKash)</strong></p>
                    <p>নিচের নম্বরে প্রয়োজনীয় টাকা পাঠান:</p>
                    <p class="bg-black/40 p-2 rounded text-center font-mono text-green-400 my-2 text-lg">01701143360</p>
                    <p class="text-yellow-400 text-xs">⚠️ টাকা পাঠানোর পর নিচের ফিল্ডে ট্রানজাকশন আইডি দিন</p>
                `;
            } else if (method === 'nagad') {
                contentDiv.innerHTML = `
                    <p><i class="fab fa-nagad text-orange-400 mr-2"></i> <strong>নগদ (Nagad)</strong></p>
                    <p>নিচের নম্বরে প্রয়োজনীয় টাকা পাঠান:</p>
                    <p class="bg-black/40 p-2 rounded text-center font-mono text-green-400 my-2 text-lg">01701143360</p>
                    <p class="text-yellow-400 text-xs">⚠️ টাকা পাঠানোর পর নিচের ফিল্ডে ট্রানজাকশন আইডি দিন</p>
                `;
            } else if (method === 'rocket') {
                contentDiv.innerHTML = `
                    <p><i class="fas fa-rocket text-blue-400 mr-2"></i> <strong>রকেট (Rocket)</strong></p>
                    <p>নিচের নম্বরে প্রয়োজনীয় টাকা পাঠান:</p>
                    <p class="bg-black/40 p-2 rounded text-center font-mono text-green-400 my-2 text-lg">01701143360</p>
                    <p class="text-yellow-400 text-xs">⚠️ টাকা পাঠানোর পর নিচের ফিল্ডে ট্রানজাকশন আইডি দিন</p>
                `;
            }
        }

        async function loadUserData() {
            const res = await fetch('/api/profile', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('userLevel').innerText = data.level;
                document.getElementById('userBalance').innerText = data.balance;
                userBalance = data.balance;
            }
        }

        async function loadPackages() {
            const res = await fetch('/api/packages');
            packages = await res.json();
            const container = document.getElementById('packagesList');
            container.innerHTML = packages.map(p => `
                <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl p-6 border ${getLevelColor(p.level)}">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div class="flex items-center gap-4">
                            <div class="${getLevelIconBg(p.level)} rounded-full w-16 h-16 flex items-center justify-center shadow-lg">
                                <i class="${getLevelIcon(p.level)} text-2xl text-white"></i>
                            </div>
                            <div>
                                <h2 class="text-2xl font-bold text-white">লেভেল ${p.level}</h2>
                                <p class="${getLevelTextColor(p.level)} font-semibold">${getLevelDesc(p.level)}</p>
                            </div>
                        </div>
                        <div class="text-center">
                            <p class="text-gray-300 text-sm">প্যাকেজ মূল্য</p>
                            <p class="text-3xl font-bold text-white">${p.price} <span class="text-sm">টাকা</span></p>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-4 mt-6">
                        <div class="bg-white/5 rounded-xl p-3 text-center">
                            <i class="fas fa-tasks text-yellow-400 text-xl mb-1"></i>
                            <p class="text-white font-semibold">দৈনিক টাস্ক</p>
                            <p class="text-2xl font-bold text-white">${p.daily_tasks} টি</p>
                            <p class="text-gray-400 text-sm">প্রতি টাস্কে ${p.task_rate} টাকা</p>
                        </div>
                        <div class="bg-white/5 rounded-xl p-3 text-center">
                            <i class="fas fa-sun text-yellow-400 text-xl mb-1"></i>
                            <p class="text-white font-semibold">দৈনিক আয়</p>
                            <p class="text-2xl font-bold text-green-400">${p.daily_tasks * p.task_rate} টাকা</p>
                        </div>
                        <div class="bg-white/5 rounded-xl p-3 text-center">
                            <i class="fas fa-calendar-alt text-yellow-400 text-xl mb-1"></i>
                            <p class="text-white font-semibold">মাসিক আয়</p>
                            <p class="text-2xl font-bold text-green-400">${(p.daily_tasks * p.task_rate) * 30} টাকা</p>
                        </div>
                    </div>
                    <button onclick="buyPackage(${p.level}, ${p.price})" class="mt-5 w-full ${getLevelButtonGradient(p.level)} text-white font-bold py-3 rounded-xl transition shadow-lg">
                        <i class="fas fa-shopping-cart mr-2"></i> লেভেল ${p.level} প্যাকেজ কিনুন
                    </button>
                </div>
            `).join('');
        }

        async function buyPackage(level, price) {
            const userLevel = parseInt(document.getElementById('userLevel').innerText);
            if (userLevel >= level) {
                alert(`আপনি ইতিমধ্যে লেভেল ${userLevel} এ আছেন বা এর উপরে!`);
                return;
            }

            const res = await fetch('/api/buy-package', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ level })
            });
            
            const data = await res.json();
            
            if (data.success) {
                showSuccessModal(data.message);
                loadUserData();
                setTimeout(() => location.reload(), 2000);
            } else if (data.needBalance) {
                currentPackage = { level, price, needAmount: data.needAmount };
                document.getElementById('modalPackageLevel').innerText = level;
                document.getElementById('modalPackagePrice').innerText = price;
                document.getElementById('modalUserBalance').innerText = userBalance;
                document.getElementById('modalNeedAmount').innerText = data.needAmount;
                document.getElementById('paymentMethod').value = '';
                document.getElementById('transactionId').value = '';
                document.getElementById('paymentInstructions').classList.add('hidden');
                document.getElementById('paymentModal').style.display = 'flex';
                document.getElementById('paymentModal').classList.remove('hidden');
            } else {
                alert(data.error || 'দুঃখিত, সমস্যা হয়েছে');
            }
        }

        async function submitPaymentRequest() {
            const paymentMethod = document.getElementById('paymentMethod').value;
            const transactionId = document.getElementById('transactionId').value;
            
            if (!paymentMethod) {
                alert('পেমেন্ট মেথড সিলেক্ট করুন!');
                return;
            }
            
            if (!transactionId) {
                alert('ট্রানজাকশন আইডি দিন!');
                return;
            }
            
            const res = await fetch('/api/request-package-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    level: currentPackage.level,
                    amount: currentPackage.needAmount,
                    transactionId: transactionId,
                    paymentMethod: paymentMethod
                })
            });
            
            const data = await res.json();
            if (res.ok) {
                closePaymentModal();
                showSuccessModal(`${currentPackage.needAmount} টাকার পেমেন্ট রিকোয়েস্ট জমা হয়েছে! অ্যাডমিন যাচাই করবেন।`);
                loadUserData();
            } else {
                alert(data.error || 'রিকোয়েস্ট জমা দিতে সমস্যা হয়েছে');
            }
        }

        function closePaymentModal() {
            document.getElementById('paymentModal').style.display = 'none';
            document.getElementById('paymentModal').classList.add('hidden');
        }

        function showSuccessModal(message) {
            document.getElementById('successMessage').innerText = message;
            document.getElementById('successModal').style.display = 'flex';
            document.getElementById('successModal').classList.remove('hidden');
            setTimeout(() => closeSuccessModal(), 4000);
        }

        function closeSuccessModal() {
            document.getElementById('successModal').style.display = 'none';
            document.getElementById('successModal').classList.add('hidden');
        }

        function getLevelColor(level) {
            const colors = {1: 'border-green-500/30', 2: 'border-blue-500/30', 3: 'border-purple-500/30', 4: 'border-orange-500/30', 5: 'border-yellow-500/30'};
            return colors[level] || 'border-gray-500/30';
        }
        function getLevelIconBg(level) {
            const colors = {1: 'bg-green-500', 2: 'bg-blue-500', 3: 'bg-purple-500', 4: 'bg-orange-500', 5: 'bg-yellow-500'};
            return colors[level] || 'bg-gray-500';
        }
        function getLevelIcon(level) {
            const icons = {1: 'fas fa-star', 2: 'fas fa-gem', 3: 'fas fa-crown', 4: 'fas fa-trophy', 5: 'fas fa-medal'};
            return icons[level] || 'fas fa-box';
        }
        function getLevelTextColor(level) {
            const colors = {1: 'text-green-400', 2: 'text-blue-400', 3: 'text-purple-400', 4: 'text-orange-400', 5: 'text-yellow-400'};
            return colors[level] || 'text-gray-400';
        }
        function getLevelDesc(level) {
            const descs = {1: 'শুরু করার জন্য আদর্শ', 2: 'আয় বাড়ানোর সময়', 3: 'প্রফেশনাল লেভেল', 4: 'এক্সপার্ট লেভেল', 5: 'আলটিমেট লেভেল'};
            return descs[level] || 'প্রিমিয়াম প্যাকেজ';
        }
        function getLevelButtonGradient(level) {
            const gradients = {1: 'bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700', 2: 'bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700', 3: 'bg-gradient-to-r from-purple-500 to-pink-600 hover:from-purple-600 hover:to-pink-700', 4: 'bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700', 5: 'bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-600 hover:to-amber-700'};
            return gradients[level] || 'bg-gradient-to-r from-gray-500 to-gray-600';
        }

        loadUserData();
        loadPackages();
    </script>
</body>
</html>
