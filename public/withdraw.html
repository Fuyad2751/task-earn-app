<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>উত্তোলন</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 pb-16">
    <header class="bg-blue-600 text-white p-4 text-center">উত্তোলন করুন</header>
    <div class="p-4">
        <input type="number" id="amount" placeholder="টাকার পরিমাণ" class="w-full border p-2 rounded mb-3">
        <button onclick="requestWithdraw()" class="bg-yellow-600 text-white w-full py-2 rounded">উত্তোলনের আবেদন</button>
        <p id="msg" class="text-sm mt-2 text-red-500"></p>
    </div>
    <nav class="fixed bottom-0 left-0 w-full bg-gray-900/90 backdrop-blur border-t border-gray-800 flex justify-around py-2">
    <a href="dashboard-home.html" class="flex flex-col items-center text-gray-400 hover:text-yellow-400">
        <i class="fas fa-home text-xl"></i>
        <span class="text-xs">হোম</span>
    </a>
    <a href="dashboard.html" class="flex flex-col items-center text-gray-400 hover:text-yellow-400">
        <i class="fas fa-tasks text-xl"></i>
        <span class="text-xs">টাস্ক</span>
    </a>
    <a href="packages.html" class="flex flex-col items-center text-gray-400 hover:text-yellow-400">
        <i class="fas fa-box text-xl"></i>
        <span class="text-xs">প্যাকেজ</span>
    </a>
    <a href="withdraw.html" class="flex flex-col items-center text-yellow-400">
        <i class="fas fa-wallet text-xl"></i>
        <span class="text-xs">উত্তোলন</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center text-gray-400 hover:text-yellow-400">
        <i class="fas fa-user text-xl"></i>
        <span class="text-xs">প্রোফাইল</span>
    </a>
</nav>
    <script>
        const token = localStorage.getItem('authToken');
        if (!token) window.location.href = 'login.html';
        
        async function requestWithdraw() {
            const amount = document.getElementById('amount').value;
            const res = await fetch('/api/request-withdraw', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ amount: parseFloat(amount) })
            });
            const data = await res.json();
            if (res.ok) alert('আবেদন জমা হয়েছে। ১-২৪ ঘন্টার মধ্যে প্রক্রিয়া করা হবে।');
            else document.getElementById('msg').innerText = data.error;
        }
    </script>
</body>
</html>
