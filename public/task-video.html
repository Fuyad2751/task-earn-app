<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ভিডিও টাস্ক - টাস্ক কিং</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 1rem;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen pb-24">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2"><i class="fas fa-video text-2xl"></i><span class="text-xl font-bold">ভিডিও টাস্ক</span></div>
            <div class="flex items-center gap-3">
                <span class="text-sm bg-white/20 px-3 py-1 rounded-full"><i class="fas fa-chart-simple mr-1"></i> লেভেল <span id="userLevel">১</span></span>
                <span class="text-sm bg-yellow-500/30 px-3 py-1 rounded-full"><i class="fas fa-coins mr-1"></i> <span id="userPoints">০</span> টাকা</span>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6 max-w-3xl">
        <div id="noPackageCard" class="hidden bg-gradient-to-br from-red-500/20 to-orange-600/20 rounded-2xl p-8 text-center border border-red-500/30 backdrop-blur">
            <div class="bg-red-500/30 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-4"><i class="fas fa-lock text-4xl text-red-400"></i></div>
            <h2 class="text-2xl font-bold text-white mb-2">প্যাকেজ প্রয়োজন!</h2>
            <p class="text-white/80 mb-4" id="noPackageMsg">টাস্ক শুরু করতে আপনাকে একটি প্যাকেজ কিনতে হবে।</p>
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="packages.html" class="bg-gradient-to-r from-yellow-500 to-orange-500 text-white font-bold py-3 px-6 rounded-xl hover:from-yellow-600 hover:to-orange-600 transition shadow-lg"><i class="fas fa-shopping-cart mr-2"></i> প্যাকেজ কিনুন</a>
                <a href="dashboard-home.html" class="bg-white/10 backdrop-blur border border-white/20 text-white font-bold py-3 px-6 rounded-xl hover:bg-white/20 transition"><i class="fas fa-home mr-2"></i> হোম পেজে যান</a>
            </div>
        </div>

        <div id="taskContent" class="hidden">
            <div class="bg-white/10 backdrop-blur rounded-2xl p-6 border border-white/20 shadow-xl">
                <div class="mb-6"><div class="flex justify-between text-sm text-white/70 mb-2"><span><i class="fas fa-chart-line mr-1"></i> টাস্ক অগ্রগতি</span><span id="progressPercent">০%</span></div><div class="w-full bg-white/20 rounded-full h-3"><div id="progressBar" class="bg-gradient-to-r from-yellow-400 to-orange-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div></div></div>
                <h2 id="taskTitle" class="text-2xl font-bold text-white mb-2">লোড হচ্ছে...</h2>
                <p id="taskDesc" class="text-white/70 mb-6">অনুগ্রহ করে ভিডিওটি মনোযোগ দিয়ে দেখুন</p>
                
                <div class="video-container mb-6">
                    <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
                </div>

                <div id="questionSection" class="hidden">
                    <div class="bg-white/5 rounded-xl p-5 mb-6 border border-white/10">
                        <h3 class="text-xl font-bold text-yellow-400 mb-3"><i class="fas fa-question-circle mr-2"></i> ভিডিও সম্পর্কিত প্রশ্ন</h3>
                        <p id="questionText" class="text-white text-lg mb-4">প্রশ্ন লোড হচ্ছে...</p>
                        <div id="optionsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                    </div>
                </div>

                <div id="messageArea" class="hidden rounded-xl p-4 mb-4"></div>
                <button id="nextTaskBtn" onclick="nextTask()" class="hidden w-full bg-gradient-to-r from-green-500 to-teal-500 text-white font-bold py-3 rounded-xl hover:from-green-600 hover:to-teal-600 transition shadow-lg"><i class="fas fa-arrow-right mr-2"></i> পরবর্তী টাস্ক</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 w-full bg-gray-900/90 backdrop-blur border-t border-gray-800 flex justify-around py-2">
        <a href="dashboard-home.html" class="flex flex-col items-center text-gray-400 hover:text-yellow-400"><i class="fas fa-home text-xl"></i><span class="text-xs">হোম</span></a>
        <a href="task-video.html" class="flex flex-col items-center text-yellow-400"><i class="fas fa-play-circle text-xl"></i><span class="text-xs">টাস্ক</span></a>
        <a href="packages.html" class="flex flex-col items-center text-gray-400 hover:text-yellow-400"><i class="fas fa-box text-xl"></i><span class="text-xs">প্যাকেজ</span></a>
        <a href="withdraw.html" class="flex flex-col items-center text-gray-400 hover:text-yellow-400"><i class="fas fa-wallet text-xl"></i><span class="text-xs">উত্তোলন</span></a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400 hover:text-yellow-400"><i class="fas fa-user text-xl"></i><span class="text-xs">প্রোফাইল</span></a>
    </nav>

    <script>
        const token = localStorage.getItem('authToken');
        if (!token) window.location.href = 'login.html';

        let tasks = [];
        let currentTaskIndex = 0;
        let completedTasks = [];

        async function checkPackage() {
            const res = await fetch('/api/can-do-task', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            document.getElementById('userLevel').innerText = data.level;
            if (!data.canDo) {
                document.getElementById('noPackageCard').classList.remove('hidden');
                document.getElementById('taskContent').classList.add('hidden');
                document.getElementById('noPackageMsg').innerHTML = data.message;
                return false;
            }
            document.getElementById('noPackageCard').classList.add('hidden');
            document.getElementById('taskContent').classList.remove('hidden');
            await loadTasks();
            return true;
        }

        async function loadTasks() {
            const res = await fetch('/api/my-tasks', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (data.noPackage) {
                document.getElementById('noPackageCard').classList.remove('hidden');
                document.getElementById('taskContent').classList.add('hidden');
                return;
            }
            tasks = data;
            loadCompletedTasks();
            updateProgress();
            if (tasks.length > 0) loadTask();
        }

        function loadCompletedTasks() {
            const saved = localStorage.getItem('completedTasks');
            completedTasks = saved ? JSON.parse(saved) : [];
            currentTaskIndex = completedTasks.length;
        }

        function saveCompletedTasks() {
            localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
        }

        function updateProgress() {
            const percent = tasks.length > 0 ? (completedTasks.length / tasks.length) * 100 : 0;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressPercent').innerText = Math.round(percent) + '%';
        }

        function loadTask() {
            if (currentTaskIndex >= tasks.length) {
                document.getElementById('taskTitle').innerHTML = '<i class="fas fa-trophy text-yellow-400 mr-2"></i> অভিনন্দন!';
                document.getElementById('taskDesc').innerHTML = 'আপনি সব টাস্ক সফলভাবে সম্পন্ন করেছেন!';
                document.querySelector('.video-container').classList.add('hidden');
                document.getElementById('questionSection').classList.add('hidden');
                return;
            }
            
            const task = tasks[currentTaskIndex];
            document.getElementById('taskTitle').innerHTML = `<i class="fas fa-play-circle mr-2"></i> ${task.title}`;
            document.getElementById('taskDesc').innerHTML = task.description;
            
            // ভিডিও URL সেট করুন (default YouTube ভিডিও)
            const videoUrl = task.video_url || 'https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0&rel=0';
            document.getElementById('videoFrame').src = videoUrl;
            
            document.getElementById('questionSection').classList.add('hidden');
            document.getElementById('nextTaskBtn').classList.add('hidden');
            
            // 30 সেকেন্ড পর প্রশ্ন দেখান
            setTimeout(() => showQuestion(), 30000);
        }

        function showQuestion() {
            const task = tasks[currentTaskIndex];
            document.getElementById('questionText').innerHTML = task.question || 'ভিডিওটি সম্পর্কে আপনার মতামত কী?';
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            const options = task.options || ['ভিডিওটি ভালো ছিল', 'ভিডিওটি তথ্যমূলক ছিল', 'ভিডিওটি দরকারী ছিল', 'ভিডিওটি চমৎকার ছিল'];
            options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.innerHTML = `<i class="fas fa-circle mr-2"></i> ${option}`;
                btn.className = 'w-full text-left px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white hover:bg-white/20 transition mb-2';
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });
            document.getElementById('questionSection').classList.remove('hidden');
        }

        async function checkAnswer(selectedIndex) {
            const task = tasks[currentTaskIndex];
            const messageArea = document.getElementById('messageArea');
            
            if (!completedTasks.includes(task.id)) {
                completedTasks.push(task.id);
                saveCompletedTasks();
                await addPoints(task.points_reward || task.task_rate || 15);
                updateProgress();
            }
            
            messageArea.className = 'rounded-xl p-4 mb-4 bg-green-500/20 border border-green-500 text-green-400';
            messageArea.innerHTML = '<i class="fas fa-check-circle mr-2"></i> টাস্ক সম্পন্ন হয়েছে!';
            messageArea.classList.remove('hidden');
            document.getElementById('nextTaskBtn').classList.remove('hidden');
            document.getElementById('questionSection').classList.add('hidden');
        }

        async function addPoints(amount) {
            const res = await fetch('/api/complete-task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ taskId: tasks[currentTaskIndex].id })
            });
            if (res.ok) {
                const pointsRes = await fetch('/api/profile', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await pointsRes.json();
                document.getElementById('userPoints').innerText = data.balance || 0;
            }
        }

        function nextTask() {
            currentTaskIndex++;
            document.getElementById('messageArea').classList.add('hidden');
            loadTask();
        }

        checkPackage();
    </script>
</body>
</html>
