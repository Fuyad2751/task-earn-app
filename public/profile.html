<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>প্রোফাইল - টাস্ক কিং</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen pb-24">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-user-circle text-2xl"></i>
                <span class="text-xl font-bold">আমার প্রোফাইল</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm bg-white/20 px-3 py-1 rounded-full">
                    <i class="fas fa-chart-simple mr-1"></i> লেভেল <span id="userLevel">১</span>
                </span>
                <a href="logout.html" class="text-white/80 hover:text-white">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6 max-w-4xl">
        <!-- Profile Header Card with Profile Pic -->
        <div class="bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl p-6 mb-6 text-white shadow-xl">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <!-- Profile Picture -->
                <div class="relative">
                    <div id="profilePicContainer" class="bg-white/20 rounded-full w-28 h-28 flex items-center justify-center overflow-hidden">
                        <img id="profilePic" src="" alt="Profile" class="w-full h-full object-cover">
                        <i id="defaultIcon" class="fas fa-user-circle text-6xl text-white hidden"></i>
                    </div>
                    <button onclick="openProfilePicModal()" class="absolute bottom-0 right-0 bg-yellow-500 rounded-full w-8 h-8 flex items-center justify-center hover:bg-yellow-600 transition">
                        <i class="fas fa-camera text-white text-sm"></i>
                    </button>
                </div>
                <div class="flex-1 text-center md:text-left">
                    <h1 class="text-2xl font-bold" id="profileUsername">লোড হচ্ছে...</h1>
                    <p class="text-white/80">মেম্বার সিন্স: <span id="memberSince">...</span></p>
                    <div class="flex flex-wrap gap-2 mt-2 justify-center md:justify-start">
                        <span class="bg-white/20 px-3 py-1 rounded-full text-sm">
                            <i class="fas fa-id-card mr-1"></i> আইডি: <span id="userId">...</span>
                        </span>
                        <span class="bg-white/20 px-3 py-1 rounded-full text-sm">
                            <i class="fas fa-code-branch mr-1"></i> রেফারেল কোড: <span id="referralCode">...</span>
                        </span>
                    </div>
                </div>
                <div class="text-center md:text-right">
                    <div class="bg-white/20 rounded-xl px-4 py-2">
                        <p class="text-sm">আইডির অবস্থা</p>
                        <p class="font-bold text-green-300" id="userStatus">active</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Profile Pic Upload Modal -->
        <div id="profilePicModal" class="fixed inset-0 bg-black/70 backdrop-blur z-50 hidden items-center justify-center p-4">
            <div class="bg-gray-800 rounded-2xl p-6 max-w-md w-full border border-gray-700">
                <h3 class="text-xl font-bold text-white mb-4">প্রোফাইল ছবি আপলোড করুন</h3>
                <div class="border-2 border-dashed border-gray-600 rounded-xl p-6 text-center">
                    <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-2"></i>
                    <p class="text-gray-400 text-sm mb-2">JPG, PNG বা GIF ফাইল (সর্বোচ্চ 2MB)</p>
                    <input type="file" id="profilePicInput" accept="image/*" class="hidden">
                    <button onclick="document.getElementById('profilePicInput').click()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                        <i class="fas fa-folder-open mr-2"></i> ছবি নির্বাচন করুন
                    </button>
                </div>
                <div class="flex gap-3 mt-4">
                    <button onclick="uploadProfilePic()" class="flex-1 bg-green-600 text-white font-bold py-2 rounded-lg hover:bg-green-700 transition">আপলোড করুন</button>
                    <button onclick="closeProfilePicModal()" class="flex-1 bg-gray-600 text-white font-bold py-2 rounded-lg hover:bg-gray-700 transition">বাতিল</button>
                </div>
                <div id="uploadStatus" class="mt-3 text-center hidden"></div>
            </div>
        </div>

        <!-- Balance Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="stat-card bg-gradient-to-br from-green-500/20 to-emerald-600/20 rounded-xl p-4 border border-green-500/30 backdrop-blur">
                <div class="flex items-center justify-between">
                    <div><p class="text-gray-300 text-sm">মূল ব্যালেন্স</p><p class="text-2xl font-bold text-white"><span id="mainBalance">০</span> টাকা</p></div>
                    <div class="bg-green-500/30 rounded-full p-3"><i class="fas fa-wallet text-2xl text-green-400"></i></div>
                </div>
            </div>
            <div class="stat-card bg-gradient-to-br from-yellow-500/20 to-orange-600/20 rounded-xl p-4 border border-yellow-500/30 backdrop-blur">
                <div class="flex items-center justify-between">
                    <div><p class="text-gray-300 text-sm">আজকের আয়</p><p class="text-2xl font-bold text-white"><span id="todayEarning">০</span> টাকা</p></div>
                    <div class="bg-yellow-500/30 rounded-full p-3"><i class="fas fa-sun text-2xl text-yellow-400"></i></div>
                </div>
            </div>
            <div class="stat-card bg-gradient-to-br from-purple-500/20 to-pink-600/20 rounded-xl p-4 border border-purple-500/30 backdrop-blur">
                <div class="flex items-center justify-between">
                    <div><p class="text-gray-300 text-sm">রেফারেল কমিশন</p><p class="text-2xl font-bold text-white"><span id="referralCommission">০</span> টাকা</p></div>
                    <div class="bg-purple-500/30 rounded-full p-3"><i class="fas fa-users text-2xl text-purple-400"></i></div>
                </div>
            </div>
        </div>

        <!-- বাকি কন্টেন্ট (স্ট্যাটস, রেফারেল লিস্ট, একাউন্ট তথ্য) -->
        <!-- ... আপনার বিদ্যমান কোড ... -->

    </div>

    <!-- Bottom Navigation -->
    <!-- ... আপনার বিদ্যমান কোড ... -->

    <script>
        const token = localStorage.getItem('authToken');
        if (!token) window.location.href = 'login.html';

        let userData = {};

        async function loadProfile() {
            const res = await fetch('/api/profile', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                userData = await res.json();
                updateProfileUI();
                checkProfilePicStatus();
            } else {
                localStorage.removeItem('authToken');
                window.location.href = 'login.html';
            }
        }

        function updateProfileUI() {
            document.getElementById('profileUsername').innerText = userData.username || '-';
            document.getElementById('userId').innerText = userData.id || '-';
            document.getElementById('userLevel').innerText = userData.level || 1;
            document.getElementById('referralCode').innerText = userData.referral_code || '-';
            
            // প্রোফাইল পিক দেখান
            if (userData.profile_pic) {
                document.getElementById('profilePic').src = userData.profile_pic;
                document.getElementById('profilePic').classList.remove('hidden');
                document.getElementById('defaultIcon').classList.add('hidden');
            } else {
                document.getElementById('profilePic').classList.add('hidden');
                document.getElementById('defaultIcon').classList.remove('hidden');
            }
            
            // বাকি UI আপডেট...
            const mainBal = (userData.total_earnings || 0) - (userData.total_withdrawn || 0);
            document.getElementById('mainBalance').innerText = mainBal;
            document.getElementById('totalEarnings').innerText = userData.total_earnings || 0;
            document.getElementById('totalWithdrawn').innerText = userData.total_withdrawn || 0;
        }

        async function checkProfilePicStatus() {
            const res = await fetch('/api/check-profile-pic', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (!data.hasProfilePic) {
                // প্রোফাইল পিক না থাকলে মডাল দেখান
                setTimeout(() => {
                    alert('দয়া করে আপনার প্রোফাইল ছবি আপলোড করুন! এটি বাধ্যতামূলক।');
                    openProfilePicModal();
                }, 1000);
            }
        }

        function openProfilePicModal() {
            document.getElementById('profilePicModal').style.display = 'flex';
            document.getElementById('profilePicModal').classList.remove('hidden');
            document.getElementById('profilePicInput').value = '';
            document.getElementById('uploadStatus').classList.add('hidden');
        }

        function closeProfilePicModal() {
            document.getElementById('profilePicModal').style.display = 'none';
            document.getElementById('profilePicModal').classList.add('hidden');
        }

        async function uploadProfilePic() {
            const fileInput = document.getElementById('profilePicInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('দয়া করে একটি ছবি নির্বাচন করুন!');
                return;
            }
            
            const formData = new FormData();
            formData.append('profile_pic', file);
            
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.className = 'mt-3 text-center text-yellow-400';
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> আপলোড হচ্ছে...';
            statusDiv.classList.remove('hidden');
            
            const res = await fetch('/api/upload-profile-pic', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            
            const data = await res.json();
            if (res.ok) {
                statusDiv.className = 'mt-3 text-center text-green-400';
                statusDiv.innerHTML = '<i class="fas fa-check-circle mr-2"></i> প্রোফাইল ছবি আপলোড সফল!';
                setTimeout(() => {
                    closeProfilePicModal();
                    loadProfile();
                }, 1500);
            } else {
                statusDiv.className = 'mt-3 text-center text-red-400';
                statusDiv.innerHTML = '<i class="fas fa-exclamation-circle mr-2"></i> ' + data.error;
            }
        }

        loadProfile();
    </script>
</body>
</html>
