<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <h1 class="text-2xl font-bold mb-4">অ্যাডমিন প্যানেল</h1>
    <div class="grid gap-4">
        <button onclick="loadPendingPackages()" class="bg-blue-500 text-white p-2 rounded">পেন্ডিং প্যাকেজ রিকোয়েস্ট</button>
        <button onclick="loadPendingWithdrawals()" class="bg-yellow-500 text-white p-2 rounded">পেন্ডিং উত্তোলন</button>
        <button onclick="loadUsers()" class="bg-green-500 text-white p-2 rounded">ইউজার ম্যানেজমেন্ট</button>
    </div>
    <div id="result" class="mt-6"></div>
    <script>
        const token = localStorage.getItem('authToken');
        if (!token) window.location.href = 'login.html';
        
        async function callApi(url, options = {}) {
            const res = await fetch(url, { ...options, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } });
            return res.json();
        }
        
        async function loadPendingPackages() {
            const data = await callApi('/admin/pending-packages');
            document.getElementById('result').innerHTML = data.map(p => `
                <div class="bg-white p-3 mb-2 rounded shadow">
                    <p>ইউজার: ${p.username} | লেভেল ${p.level} | টাকা: ${p.amount} | TxID: ${p.transaction_id}</p>
                    <button onclick="approvePackage(${p.id})" class="bg-green-600 text-white px-3 py-1 rounded">অ্যাপ্রুভ</button>
                </div>
            `).join('');
        }
        
        async function approvePackage(id) {
            await callApi('/admin/approve-package', { method: 'POST', body: JSON.stringify({ requestId: id }) });
            alert('অ্যাপ্রুভ করা হয়েছে'); loadPendingPackages();
        }
        
        async function loadPendingWithdrawals() {
            const data = await callApi('/admin/pending-withdrawals');
            document.getElementById('result').innerHTML = data.map(w => `
                <div class="bg-white p-3 mb-2 rounded shadow">
                    <p>ইউজার: ${w.username} | টাকা: ${w.amount} | মোবাইল: ${w.mobile}</p>
                    <button onclick="processWithdraw(${w.id})" class="bg-blue-600 text-white px-3 py-1 rounded">প্রসেস করুন</button>
                </div>
            `).join('');
        }
        
        async function processWithdraw(id) {
            await callApi('/admin/process-withdraw', { method: 'POST', body: JSON.stringify({ withdrawalId: id }) });
            alert('উত্তোলন প্রসেস করা হয়েছে'); loadPendingWithdrawals();
        }
        
        async function loadUsers() {
            const users = await callApi('/admin/users');
            document.getElementById('result').innerHTML = users.map(u => `
                <div class="bg-white p-3 mb-2 rounded shadow">
                    <p>${u.username} | লেভেল ${u.level} | আয় ${u.total_earnings} | স্ট্যাটাস ${u.status}</p>
                    <button onclick="toggleStatus(${u.id}, '${u.status === 'active' ? 'blocked' : 'active'}')" class="bg-red-600 text-white px-3 py-1 rounded">${u.status === 'active' ? 'ব্লক' : 'আনব্লক'}</button>
                </div>
            `).join('');
        }
        
        async function toggleStatus(userId, newStatus) {
            await callApi('/admin/toggle-user-status', { method: 'POST', body: JSON.stringify({ userId, status: newStatus }) });
            loadUsers();
        }
    </script>
</body>
</html>
