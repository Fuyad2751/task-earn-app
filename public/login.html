<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>লগইন - টাস্ক কিং</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-600 via-indigo-700 to-purple-800 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl p-8 w-full max-w-md border border-white/20">
        <div class="text-center mb-8">
            <div class="bg-gradient-to-r from-yellow-400 to-orange-500 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-tasks text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white">টাস্ক কিং</h1>
            <p class="text-white/80 mt-2">আপনার অ্যাকাউন্টে লগইন করুন</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-white mb-2">ইউজারনেম</label>
                <input type="text" id="loginUsername" placeholder="আপনার ইউজারনেম দিন" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>
            <div>
                <label class="block text-white mb-2">পাসওয়ার্ড</label>
                <input type="password" id="loginPassword" placeholder="********" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>
            <button onclick="login()" class="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-bold py-3 rounded-xl hover:from-yellow-500 hover:to-orange-600 transition duration-300 transform hover:scale-105 shadow-lg">
                <i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন
            </button>
        </div>

        <div class="text-center mt-6">
            <p class="text-white/80">নতুন ইউজার? <a href="register.html" class="text-yellow-400 font-semibold hover:underline">অ্যাকাউন্ট খুলুন</a></p>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                alert('ইউজারনেম এবং পাসওয়ার্ড দিন!');
                return;
            }

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('authToken', data.token);
                alert('লগইন সফল!');
                window.location.href = 'dashboard.html';
            } else {
                const error = await res.json();
                alert(error.error || 'ভুল ইউজারনেম বা পাসওয়ার্ড');
            }
        }
    </script>
</body>
</html>
