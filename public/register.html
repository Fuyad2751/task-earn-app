<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>রেজিস্টার - টাস্ক কিং</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-emerald-500 via-teal-500 to-cyan-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl p-8 w-full max-w-md border border-white/20">
        <div class="text-center mb-8">
            <div class="bg-gradient-to-r from-yellow-400 to-orange-500 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-tasks text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white">টাস্ক কিং</h1>
            <p class="text-white/80 mt-2">নতুন অ্যাকাউন্ট তৈরি করুন এবং আয় শুরু করুন</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-white mb-2">ইউজারনেম</label>
                <input type="text" id="username" placeholder="আপনার ইউজারনেম দিন" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white">
            </div>
            <div>
                <label class="block text-white mb-2">পাসওয়ার্ড</label>
                <input type="password" id="password" placeholder="********" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white">
            </div>
            <div>
                <label class="block text-white mb-2">মোবাইল নম্বর</label>
                <input type="tel" id="mobile" placeholder="01XXXXXXXXX" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white">
            </div>
            <div>
                <label class="block text-white mb-2">রেফারেল কোড (ঐচ্ছিক)</label>
                <input type="text" id="refCode" placeholder="যদি থাকে" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white">
            </div>
            <button onclick="register()" class="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-bold py-3 rounded-xl hover:from-yellow-500 hover:to-orange-600 transition duration-300 transform hover:scale-105 shadow-lg">
                <i class="fas fa-user-plus mr-2"></i> রেজিস্টার করুন
            </button>
        </div>

        <div class="text-center mt-6">
            <p class="text-white/80">ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="login.html" class="text-white font-semibold hover:underline">লগইন করুন</a></p>
        </div>
    </div>

    <script>
        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const mobile = document.getElementById('mobile').value;
            const refCode = document.getElementById('refCode').value;

            if (!username || !password || !mobile) {
                alert('সব ঘর পূরণ করুন!');
                return;
            }

            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, mobile, referralCode: refCode })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('authToken', data.token);
                alert('রেজিস্ট্রেশন সফল!');
                window.location.href = 'dashboard.html';
            } else {
                alert('ইউজারনেম আগে থেকেই আছে বা অন্য সমস্যা');
            }
        }
    </script>
</body>
</html>
