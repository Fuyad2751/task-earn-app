<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>রেজিস্টার - টাস্ক কিং</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body class="bg-gradient-to-br from-emerald-500 via-teal-500 to-cyan-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl p-8 w-full max-w-md border border-white/20">
        <div class="text-center mb-8">
            <div class="bg-gradient-to-r from-yellow-400 to-orange-500 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-tasks text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white">টাস্ক কিং</h1>
            <p class="text-white/80 mt-2">নতুন অ্যাকাউন্ট তৈরি করুন এবং আয় শুরু করুন</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-white mb-2">ইউজারনেম</label>
                <input type="text" id="username" placeholder="আপনার ইউজারনেম দিন" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white">
            </div>
            <div>
                <label class="block text-white mb-2">পাসওয়ার্ড</label>
                <input type="password" id="password" placeholder="********" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white">
            </div>
            <div>
                <label class="block text-white mb-2">মোবাইল নম্বর</label>
                <input type="tel" id="mobile" placeholder="01XXXXXXXXX" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white">
            </div>
            <div>
                <label class="block text-white mb-2">রেফারেল কোড (ঐচ্ছিক)</label>
                <input type="text" id="refCode" placeholder="যদি থাকে" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white">
            </div>
            
            <!-- ফেস ভেরিফিকেশন সেকশন -->
            <div id="faceVerificationSection" class="bg-yellow-500/20 rounded-xl p-4">
                <p class="text-white text-sm mb-2"><i class="fas fa-face-smile mr-2"></i> ফেস ভেরিফিকেশন বাধ্যতামূলক</p>
                <div id="cameraContainer" class="relative">
                    <video id="faceVideo" autoplay playsinline class="w-full rounded-lg bg-black" style="min-height: 200px;"></video>
                    <div id="faceStatus" class="absolute bottom-2 left-0 right-0 text-center text-white text-xs bg-black/50 p-1 rounded">ক্যামেরা চালু হচ্ছে...</div>
                </div>
                <button type="button" id="captureFaceBtn" class="mt-2 w-full bg-purple-600 text-white font-bold py-2 rounded-xl hover:bg-purple-700 transition" disabled>
                    <i class="fas fa-camera mr-2"></i> ফেস ক্যাপচার করুন
                </button>
                <div id="faceCapturedStatus" class="text-center text-green-400 text-sm mt-2 hidden">
                    <i class="fas fa-check-circle mr-1"></i> ফেস ক্যাপচার করা হয়েছে
                </div>
                <div id="loadingStatus" class="text-center text-yellow-400 text-sm mt-2">
                    <i class="fas fa-spinner fa-spin mr-1"></i> মডেল লোড হচ্ছে...
                </div>
            </div>
            
            <div id="faceWarning" class="bg-green-500/20 rounded-xl p-4 text-center hidden">
                <p class="text-white"><i class="fas fa-check-circle mr-2"></i> ফেস ভেরিফিকেশন বন্ধ আছে। সরাসরি রেজিস্ট্রেশন করুন।</p>
            </div>
            
            <button id="registerBtn" class="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-bold py-3 rounded-xl hover:from-yellow-500 hover:to-orange-600 transition duration-300 transform hover:scale-105 shadow-lg" disabled>
                <i class="fas fa-user-plus mr-2"></i> রেজিস্টার করুন
            </button>
        </div>

        <div class="text-center mt-6">
            <p class="text-white/80">ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="login.html" class="text-white font-semibold hover:underline">লগইন করুন</a></p>
        </div>
    </div>

    <script>
        let faceDescriptor = null;
        let faceCaptured = false;
        let video = null;
        let stream = null;
        let modelsLoaded = false;
        let isFaceRequired = true;
        
        // ফেস ভেরিফিকেশন প্রয়োজন কিনা চেক করুন
        async function checkFaceVerificationRequired() {
            try {
                const res = await fetch('/api/face-verification-status');
                const data = await res.json();
                return data.enabled === true;
            } catch(e) {
                console.error('Face status check error:', e);
                return true;
            }
        }
        
        // ফেস মডেল লোড করুন
        async function loadModels() {
            try {
                console.log('মডেল লোড শুরু...');
                const modelsPath = '/models';
                
                await faceapi.nets.tinyFaceDetector.loadFromUri(modelsPath);
                console.log('✅ tinyFaceDetector লোডেড');
                await faceapi.nets.faceLandmark68Net.loadFromUri(modelsPath);
                console.log('✅ faceLandmark68Net লোডেড');
                await faceapi.nets.faceRecognitionNet.loadFromUri(modelsPath);
                console.log('✅ faceRecognitionNet লোডেড');
                
                modelsLoaded = true;
                document.getElementById('loadingStatus').innerHTML = '<i class="fas fa-check-circle mr-1"></i> মডেল লোড সম্পন্ন';
                startWebcam();
            } catch (err) {
                console.error('Model load error:', err);
                document.getElementById('loadingStatus').innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i> মডেল লোড ব্যর্থ!';
            }
        }
        
        // ওয়েবক্যাম শুরু করুন
        async function startWebcam() {
            try {
                console.log('ক্যামেরা শুরু হচ্ছে...');
                const videoElement = document.getElementById('faceVideo');
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 400 },
                        height: { ideal: 300 },
                        facingMode: 'user'
                    } 
                });
                videoElement.srcObject = stream;
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    console.log('ক্যামেরা চালু হয়েছে');
                    document.getElementById('faceStatus').innerHTML = 'মুখ ক্যামেরার সামনে রাখুন';
                    document.getElementById('captureFaceBtn').disabled = false;
                };
            } catch (err) {
                console.error('Webcam error:', err);
                document.getElementById('faceStatus').innerHTML = 'ক্যামেরা অ্যাক্সেস দেওয়া হয়নি!';
            }
        }
        
        // ফেস ক্যাপচার করুন
        async function captureFace() {
            if (!modelsLoaded) {
                alert('মডেল লোড হচ্ছে, একটু অপেক্ষা করুন...');
                return;
            }
            
            if (!video || !video.videoWidth || video.videoWidth === 0) {
                alert('ক্যামেরা শুরু হয়নি!');
                return;
            }
            
            document.getElementById('faceStatus').innerHTML = 'ফেস স্ক্যান করা হচ্ছে...';
            document.getElementById('captureFaceBtn').disabled = true;
            
            try {
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptor();
                
                if (!detection) {
                    alert('মুখ শনাক্ত করা যায়নি! ভালো আলোতে সোজা হয়ে বসুন।');
                    document.getElementById('faceStatus').innerHTML = 'মুখ শনাক্ত করা যায়নি, আবার চেষ্টা করুন';
                    document.getElementById('captureFaceBtn').disabled = false;
                    return;
                }
                
                faceDescriptor = Array.from(detection.descriptor);
                faceCaptured = true;
                
                document.getElementById('faceCapturedStatus').classList.remove('hidden');
                document.getElementById('registerBtn').disabled = false;
                document.getElementById('captureFaceBtn').innerHTML = '<i class="fas fa-check-circle mr-2"></i> ফেস ক্যাপচার করা হয়েছে';
                document.getElementById('captureFaceBtn').classList.add('bg-green-600');
                document.getElementById('captureFaceBtn').classList.remove('bg-purple-600');
                document.getElementById('faceStatus').innerHTML = '✅ ফেস ক্যাপচার সম্পন্ন!';
                
            } catch (err) {
                console.error('Face capture error:', err);
                alert('ফেস ক্যাপচার করতে সমস্যা হয়েছে।');
                document.getElementById('faceStatus').innerHTML = 'ত্রুটি, আবার চেষ্টা করুন';
                document.getElementById('captureFaceBtn').disabled = false;
            }
        }
        
        // রেজিস্ট্রেশন
        async function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const mobile = document.getElementById('mobile').value.trim();
            const refCode = document.getElementById('refCode').value.trim();

            if (!username || !password || !mobile) {
                alert('সব ঘর পূরণ করুন!');
                return;
            }
            
            if (password.length < 4) {
                alert('পাসওয়ার্ড কমপক্ষে 4 অক্ষরের হতে হবে!');
                return;
            }
            
            if (isFaceRequired && (!faceCaptured || !faceDescriptor)) {
                alert('দয়া করে ফেস ক্যাপচার করুন!');
                return;
            }

            const registerBtn = document.getElementById('registerBtn');
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> রেজিস্ট্রেশন হচ্ছে...';

            try {
                const bodyData = { 
                    username, 
                    password, 
                    mobile, 
                    referralCode: refCode
                };
                
                if (isFaceRequired && faceDescriptor) {
                    bodyData.faceDescriptor = faceDescriptor;
                }
                
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });

                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('authToken', data.token);
                    alert('রেজিস্ট্রেশন সফল!');
                    window.location.href = 'dashboard-home.html';
                } else {
                    alert(data.error || 'ইউজারনেম আগে থেকেই আছে');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '<i class="fas fa-user-plus mr-2"></i> রেজিস্টার করুন';
                }
            } catch (err) {
                alert('সার্ভারে সমস্যা, পরে আবার চেষ্টা করুন');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus mr-2"></i> রেজিস্টার করুন';
            }
        }
        
        // পেজ আনলোড হলে ক্যামেরা বন্ধ করুন
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
        
        // পেজ লোড হলে
        async function init() {
            isFaceRequired = await checkFaceVerificationRequired();
            
            const faceSection = document.getElementById('faceVerificationSection');
            const faceWarning = document.getElementById('faceWarning');
            const registerBtn = document.getElementById('registerBtn');
            
            if (!isFaceRequired) {
                // ফেস ভেরিফিকেশন বন্ধ
                faceSection.style.display = 'none';
                faceWarning.classList.remove('hidden');
                registerBtn.disabled = false;
            } else {
                // ফেস ভেরিফিকেশন চালু
                faceSection.style.display = 'block';
                faceWarning.classList.add('hidden');
                loadModels();
            }
        }
        
        init();
        
        document.getElementById('captureFaceBtn').onclick = captureFace;
        document.getElementById('registerBtn').onclick = register;
    </script>
</body>
</html>
