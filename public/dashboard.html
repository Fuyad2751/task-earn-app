<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ড্যাশবোর্ড</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 pb-16">
    <header class="bg-blue-600 text-white p-4 text-center">আজকের টাস্ক</header>
    <div id="taskList" class="p-4 space-y-3"></div>
        <nav class="fixed bottom-0 left-0 w-full bg-gray-900/90 backdrop-blur border-t border-gray-800 flex justify-around py-2">
        <a href="dashboard-home.html" class="flex flex-col items-center text-yellow-400">
            <i class="fas fa-home text-xl"></i>
            <span class="text-xs">হোম</span>
        </a>
        <a href="dashboard.html" class="flex flex-col items-center text-gray-400 hover:text-white">
            <i class="fas fa-tasks text-xl"></i>
            <span class="text-xs">টাস্ক</span>
        </a>
        <a href="packages.html" class="flex flex-col items-center text-gray-400 hover:text-white">
            <i class="fas fa-box text-xl"></i>
            <span class="text-xs">প্যাকেজ</span>
        </a>
        <a href="withdraw.html" class="flex flex-col items-center text-gray-400 hover:text-white">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-xs">উত্তোলন</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-gray-400 hover:text-white">
            <i class="fas fa-user text-xl"></i>
            <span class="text-xs">প্রোফাইল</span>
        </a>
    </nav>
    <script>
        const token = localStorage.getItem('authToken');
        if (!token) window.location.href = 'login.html';
        
        async function loadTasks() {
            const res = await fetch('/api/my-tasks', { headers: { 'Authorization': `Bearer ${token}` } });
            const tasks = await res.json();
            const container = document.getElementById('taskList');
            container.innerHTML = tasks.map(t => `
                <div class="bg-white p-3 rounded shadow flex justify-between items-center">
                    <div><strong>${t.title}</strong><br><span class="text-sm">${t.description}</span></div>
                    <div>
                        ${t.completed ? '<span class="text-green-600">✔ সম্পন্ন</span>' : `<button onclick="completeTask(${t.id})" class="bg-blue-500 text-white px-3 py-1 rounded">কমপ্লিট</button>`}
                    </div>
                </div>
            `).join('');
        }
        
        async function completeTask(taskId) {
            const res = await fetch('/api/complete-task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ taskId })
            });
            if (res.ok) { alert('টাস্ক সম্পন্ন!'); loadTasks(); }
            else { const err = await res.json(); alert(err.error); }
        }
        
        loadTasks();
    </script>
</body>
</html>
